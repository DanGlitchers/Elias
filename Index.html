<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 משחק ALIAS PRO - מולטיפלייר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes bounce-word {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .animate-slide-in { animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-pulse-fast { animation: pulse-fast 1s infinite; }
        .animate-bounce-word { animation: bounce-word 0.6s ease-in-out; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        const state = {
            screen: 'home',
            playerName: '',
            roomCode: '',
            gameRoomId: '',
            isHost: false,
            players: [],
            teams: { red: [], blue: [] },
            currentWord: '',
            currentTeam: 'red',
            score: { red: 0, blue: 0 },
            timeLeft: 60,
            gameActive: false,
            gamePaused: false,
            totalRounds: 0,
            roundTime: 60,
            difficulty: 'easy',
            wordLists: {
                easy: [
                    'תפוח', 'מכונית', 'שמלה', 'ספר', 'מחשב', 'חתול', 'בית', 'עץ', 'ים', 'שמש',
                    'פלפל', 'טלפון', 'שולחן', 'כסא', 'כלב', 'עפרון', 'כובע', 'דלת', 'חלון', 'מנורה',
                    'צלחת', 'כף', 'סכין', 'מטבח', 'טלויזיה', 'כרית', 'שמיכה', 'דברים', 'אוכל', 'משקה'
                ],
                medium: [
                    'משחק', 'קולנוע', 'מסעדה', 'בית קפה', 'בריכה', 'חוף', 'הר', 'עיר', 'כביש', 'רכבת',
                    'מטוס', 'אוטובוס', 'אופניים', 'סוס', 'צפור', 'דג', 'חרק', 'פרח', 'ענן', 'כוכב',
                    'ירח', 'שמיים', 'יער', 'מדבר', 'נהר', 'עמק', 'כפר', 'גשר', 'מגדל', 'תעלה'
                ],
                hard: [
                    'סימפוניה', 'דרמה', 'טרגדיה', 'קומדיה', 'מהפכה', 'פילוסופיה', 'מטפיזיקה', 'אתיקה', 'אסתטיקה', 'אפיסטמולוגיה',
                    'אנטומיה', 'בטניקה', 'ביולוגיה', 'כימיה', 'פיזיקה', 'ספקולציה', 'הלוציה', 'אלוזיה', 'אינטואיציה', 'אמביגואיות',
                    'סימטריה', 'אסימטריה', 'קונגרואנציה', 'דיספרופורציה', 'הרמוניה', 'דיסוננס', 'קדנציה', 'רעולי', 'גרדוס', 'מודולציה'
                ]
            },
            timerInterval: null,
            pollingInterval: null,
            stats: { correctGuesses: 0, totalGuesses: 0 }
        };

        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function getRandomWord() {
            const wordList = state.wordLists[state.difficulty];
            return wordList[Math.floor(Math.random() * wordList.length)];
        }

        function saveToStorage() {
            if (state.gameRoomId) {
                const roomData = {
                    code: state.gameRoomId,
                    host: state.isHost ? state.playerName : '',
                    players: state.players,
                    gameStarted: state.screen === 'playing' || state.screen === 'results',
                    teams: state.teams,
                    score: state.score,
                    currentWord: state.currentWord,
                    gameActive: state.gameActive,
                    currentTeam: state.currentTeam,
                    timeLeft: state.timeLeft,
                    difficulty: state.difficulty,
                    roundTime: state.roundTime,
                    totalRounds: state.totalRounds,
                    stats: state.stats
                };
                localStorage.setItem(`room_${state.gameRoomId}`, JSON.stringify(roomData));
            }
        }

        function loadFromStorage(roomCode) {
            const data = localStorage.getItem(`room_${roomCode}`);
            if (data) {
                const roomData = JSON.parse(data);
                state.players = roomData.players || [];
                state.teams = roomData.teams || { red: [], blue: [] };
                state.score = roomData.score || { red: 0, blue: 0 };
                state.currentWord = roomData.currentWord || '';
                state.currentTeam = roomData.currentTeam || 'red';
                state.gameActive = roomData.gameActive || false;
                state.difficulty = roomData.difficulty || 'easy';
                state.roundTime = roomData.roundTime || 60;
                state.totalRounds = roomData.totalRounds || 0;
                state.stats = roomData.stats || state.stats;
                return roomData;
            }
            return null;
        }

        function startPolling() {
            if (state.pollingInterval) clearInterval(state.pollingInterval);
            state.pollingInterval = setInterval(() => {
                if (state.gameRoomId) {
                    const roomData = loadFromStorage(state.gameRoomId);
                    if (roomData) {
                        state.players = roomData.players || [];
                        state.teams = roomData.teams || { red: [], blue: [] };
                        state.score = roomData.score || { red: 0, blue: 0 };
                        state.currentWord = roomData.currentWord || '';
                        state.currentTeam = roomData.currentTeam || 'red';
                        if (roomData.gameStarted && state.screen === 'waiting') {
                            state.screen = 'playing';
                            startRound();
                        }
                        render();
                    }
                }
            }, 300);
        }

        function stopPolling() {
            if (state.pollingInterval) clearInterval(state.pollingInterval);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('✅ קוד הועתק!');
        }

        async function createRoom() {
            if (!state.playerName.trim()) {
                alert('בחר שם!');
                return;
            }
            const code = generateRoomCode();
            const roomData = {
                code,
                host: state.playerName,
                players: [{ name: state.playerName, joined: true }],
                gameStarted: false,
                teams: { red: [], blue: [] },
                score: { red: 0, blue: 0 },
                currentWord: '',
                gameActive: false,
                currentTeam: 'red',
                timeLeft: state.roundTime,
                difficulty: state.difficulty,
                roundTime: state.roundTime,
                totalRounds: 0,
                stats: state.stats
            };
            state.gameRoomId = code;
            state.roomCode = code;
            state.isHost = true;
            state.players = roomData.players;
            state.screen = 'waiting';
            localStorage.setItem(`room_${code}`, JSON.stringify(roomData));
            startPolling();
            render();
        }

        async function joinRoom() {
            if (!state.playerName.trim() || !state.roomCode.trim()) {
                alert('מלא שם וקוד!');
                return;
            }
            const code = state.roomCode.toUpperCase();
            const data = localStorage.getItem(`room_${code}`);
            if (!data) {
                alert('קוד לא קיים!');
                return;
            }
            const roomData = JSON.parse(data);
            if (!roomData.players.some(p => p.name === state.playerName)) {
                roomData.players.push({ name: state.playerName, joined: true });
            }
            localStorage.setItem(`room_${code}`, JSON.stringify(roomData));
            state.gameRoomId = code;
            state.roomCode = code;
            state.isHost = false;
            state.players = roomData.players;
            state.difficulty = roomData.difficulty || 'easy';
            state.roundTime = roomData.roundTime || 60;
            state.screen = 'waiting';
            startPolling();
            render();
        }

        async function startGame() {
            if (state.players.length < 2) {
                alert('צריך לפחות 2 שחקנים!');
                return;
            }
            const shuffled = [...state.players].sort(() => Math.random() - 0.5);
            const mid = Math.ceil(shuffled.length / 2);
            const newTeams = {
                red: shuffled.slice(0, mid).map(p => p.name),
                blue: shuffled.slice(mid).map(p => p.name)
            };
            const roomData = JSON.parse(localStorage.getItem(`room_${state.gameRoomId}`));
            roomData.gameStarted = true;
            roomData.teams = newTeams;
            roomData.score = { red: 0, blue: 0 };
            roomData.currentWord = getRandomWord();
            roomData.currentTeam = 'red';
            roomData.gameActive = false;
            roomData.totalRounds = 0;
            localStorage.setItem(`room_${state.gameRoomId}`, JSON.stringify(roomData));
            state.teams = newTeams;
            state.score = { red: 0, blue: 0 };
            state.currentWord = roomData.currentWord;
            state.screen = 'playing';
            state.totalRounds = 0;
            saveToStorage();
            render();
        }

        function startTimer() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                if (!state.gamePaused) {
                    state.timeLeft--;
                    saveToStorage();
                    if (state.timeLeft <= 0) {
                        clearInterval(state.timerInterval);
                        handleEndRound();
                    }
                }
                render();
            }, 1000);
        }

        async function handleEndRound() {
            state.gameActive = false;
            const nextTeam = state.currentTeam === 'red' ? 'blue' : 'red';
            state.currentTeam = nextTeam;
            state.timeLeft = state.roundTime;
            state.totalRounds++;
            const roomData = JSON.parse(localStorage.getItem(`room_${state.gameRoomId}`));
            roomData.gameActive = false;
            roomData.currentTeam = nextTeam;
            roomData.timeLeft = state.roundTime;
            roomData.totalRounds = state.totalRounds;
            localStorage.setItem(`room_${state.gameRoomId}`, JSON.stringify(roomData));
            render();
        }

        async function guessCorrect() {
            state.score[state.currentTeam]++;
            state.stats.correctGuesses++;
            state.currentWord = getRandomWord();
            saveToStorage();
            render();
        }

        async function skipWord() {
            state.stats.totalGuesses++;
            state.currentWord = getRandomWord();
            saveToStorage();
            render();
        }

        async function startRound() {
            state.currentWord = getRandomWord();
            state.timeLeft = state.roundTime;
            state.gameActive = true;
            state.gamePaused = false;
            const roomData = JSON.parse(localStorage.getItem(`room_${state.gameRoomId}`));
            roomData.gameActive = true;
            roomData.currentWord = state.currentWord;
            roomData.timeLeft = state.roundTime;
            localStorage.setItem(`room_${state.gameRoomId}`, JSON.stringify(roomData));
            startTimer();
            render();
        }

        function togglePause() {
            state.gamePaused = !state.gamePaused;
            render();
        }

        function endGame() {
            stopPolling();
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.screen = 'results';
            render();
        }

        function resetGame() {
            stopPolling();
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.screen = 'home';
            state.playerName = '';
            state.roomCode = '';
            state.gameRoomId = '';
            state.players = [];
            state.score = { red: 0, blue: 0 };
            state.teams = { red: [], blue: [] };
            state.currentWord = '';
            state.gameActive = false;
            state.currentTeam = 'red';
            state.timeLeft = 60;
            state.stats = { correctGuesses: 0, totalGuesses: 0 };
            render();
        }

        function render() {
            const app = document.getElementById('app');
            switch (state.screen) {
                case 'home': app.innerHTML = renderHome(); break;
                case 'create': app.innerHTML = renderCreate(); break;
                case 'join': app.innerHTML = renderJoin(); break;
                case 'waiting': app.innerHTML = renderWaiting(); break;
                case 'playing': app.innerHTML = renderPlaying(); break;
                case 'results': app.innerHTML = renderResults(); break;
                default: app.innerHTML = renderHome();
            }
        }

        function renderHome() {
            return `<div class="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-red-500 flex items-center justify-center p-4">
                <div class="relative z-10 max-w-2xl w-full">
                    <div class="text-center mb-12 animate-slide-in">
                        <h1 class="text-7xl font-black mb-4 text-white">🎮</h1>
                        <h1 class="text-6xl font-black text-white mb-2">ALIAS PRO</h1>
                        <p class="text-2xl text-white opacity-90">משחק מילים מוכתם</p>
                    </div>
                    <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md mx-auto w-full">
                        <div class="mb-6">
                            <label class="block text-gray-800 font-bold text-lg mb-3">בחר שם:</label>
                            <input type="text" placeholder="שם השחקן" value="${state.playerName}" onchange="state.playerName = this.value; render()" maxlength="20" class="w-full px-5 py-4 border-3 border-purple-300 rounded-2xl focus:outline-none focus:border-purple-600 text-right text-lg"/>
                        </div>
                        <button onclick="state.screen = 'create'; render()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-4 rounded-2xl mb-4 shadow-lg text-lg">📝 יצור חדר חדש</button>
                        <button onclick="state.screen = 'join'; render()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-bold py-4 rounded-2xl shadow-lg text-lg">🚪 הצטרף לחדר קיים</button>
                    </div>
                </div>
            </div>`;
        }

        function renderCreate() {
            return `<div class="min-h-screen bg-gradient-to-br from-purple-600 to-pink-500 flex items-center justify-center p-4">
                <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full">
                    <button onclick="state.screen = 'home'; render()" class="mb-6 text-gray-500 text-2xl">← חזור</button>
                    <h2 class="text-4xl font-bold mb-8 text-center text-purple-600">יצירת חדר</h2>
                    <p class="text-center text-gray-700 mb-8 text-lg">👋 שלום <span class="font-bold text-purple-600">${state.playerName}</span>!</p>
                    <div class="mb-6">
                        <label class="block text-gray-800 font-bold mb-3">רמת קושי:</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="state.difficulty = 'easy'; render()" class="px-3 py-2 rounded-lg font-semibold ${state.difficulty === 'easy' ? 'bg-green-500 text-white' : 'bg-gray-200'}">קל 😊</button>
                            <button onclick="state.difficulty = 'medium'; render()" class="px-3 py-2 rounded-lg font-semibold ${state.difficulty === 'medium' ? 'bg-yellow-500 text-white' : 'bg-gray-200'}">בינוני 😐</button>
                            <button onclick="state.difficulty = 'hard'; render()" class="px-3 py-2 rounded-lg font-semibold ${state.difficulty === 'hard' ? 'bg-red-500 text-white' : 'bg-gray-200'}">קשה 🤯</button>
                        </div>
                    </div>
                    <div class="mb-8">
                        <label class="block text-gray-800 font-bold mb-3">זמן: ${state.roundTime}s</label>
                        <input type="range" min="30" max="120" value="${state.roundTime}" onchange="state.roundTime = parseInt(this.value); render()" class="w-full h-2 bg-gray-200 rounded-lg"/>
                    </div>
                    <button onclick="createRoom()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg text-xl">✨ יצור חדר</button>
                </div>
            </div>`;
        }

        function renderJoin() {
            return `<div class="min-h-screen bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center p-4">
                <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full">
                    <button onclick="state.screen = 'home'; render()" class="mb-6 text-gray-500 text-2xl">← חזור</button>
                    <h2 class="text-4xl font-bold mb-8 text-center text-blue-600">הצטרף לחדר</h2>
                    <p class="text-center text-gray-700 mb-8 text-lg">👋 שלום <span class="font-bold text-blue-600">${state.playerName}</span>!</p>
                    <label class="block text-gray-700 font-bold mb-3 text-lg">קוד החדר:</label>
                    <input type="text" placeholder="ABC123" value="${state.roomCode}" onchange="state.roomCode = this.value.toUpperCase(); render()" oninput="state.roomCode = this.value.toUpperCase(); render()" class="w-full px-4 py-4 border-3 border-blue-300 rounded-2xl mb-4 text-center text-3xl font-black" maxlength="6"/>
                    <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-blue-500 to-cyan-600 text-white font-bold py-4 rounded-2xl shadow-lg text-lg">✅ הצטרף</button>
                </div>
            </div>`;
        }

        function renderWaiting() {
            return `<div class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-500 p-4 pb-20">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white rounded-3xl shadow-2xl p-8 mb-6 text-center">
                        <h2 class="text-5xl font-black text-purple-600 mb-4">📋 חדר משחק</h2>
                        <div class="bg-gradient-to-r from-purple-100 to-pink-100 rounded-2xl p-6 mb-4">
                            <p class="text-6xl font-black text-purple-600 tracking-widest mb-4">${state.roomCode}</p>
                            <button onclick="copyToClipboard('${state.roomCode}')" class="bg-purple-600 text-white font-bold py-2 px-6 rounded-xl text-sm">📋 העתק קוד</button>
                        </div>
                        <p class="text-gray-600 text-lg">שתף קוד זה עם חברים</p>
                    </div>
                    <div class="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                        <h3 class="text-2xl font-bold text-center mb-6 text-gray-800">👥 שחקנים (${state.players.length}/8)</h3>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            ${state.players.map((p, i) => `<div class="bg-purple-100 p-5 rounded-2xl text-center font-bold">👤 ${p.name}</div>`).join('')}
                        </div>
                        ${state.players.length < 2 ? `<p class="text-center text-red-600 font-bold text-lg">⏳ צריך לפחות 2 שחקנים (${2 - state.players.length} חסרים)</p>` : ''}
                    </div>
                    ${state.isHost && state.players.length >= 2 ? `<button onclick="startGame()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold py-5 rounded-2xl shadow-xl text-2xl">🎮 התחל משחק!</button>` : `<div class="text-center"><p class="text-white text-lg font-bold">⏳ ${state.isHost ? 'בחכייה לשחקנים' : 'בחכייה שה-Host יתחיל'}</p></div>`}
                </div>
            </div>`;
        }

        function renderPlaying() {
            const bgGradient = state.currentTeam === 'red' ? 'bg-gradient-to-br from-red-600 via-pink-500 to-red-500' : 'bg-gradient-to-br from-blue-600 via-cyan-500 to-blue-500';
            return `<div class="min-h-screen transition-all ${bgGradient} p-4 pb-20">
                <div class="max-w-4xl mx-auto">
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="${state.currentTeam === 'red' ? 'bg-red-500 ring-4 ring-red-300 scale-110' : 'bg-red-400 opacity-70'} rounded-3xl shadow-lg p-6 text-center">
                            <p class="text-white text-xl font-bold">🔴</p>
                            <p class="text-white text-5xl font-black">${state.score.red}</p>
                        </div>
                        <div class="bg-white rounded-3xl shadow-lg p-6 text-center">
                            <p class="text-gray-800 font-bold mb-2">⏱</p>
                            <p class="text-6xl font-black ${state.timeLeft <= 10 ? 'animate-pulse-fast' : ''} text-gray-800">${state.timeLeft}</p>
                        </div>
                        <div class="${state.currentTeam === 'blue' ? 'bg-blue-500 ring-4 ring-blue-300 scale-110' : 'bg-blue-400 opacity-70'} rounded-3xl shadow-lg p-6 text-center">
                            <p class="text-white text-xl font-bold">🔵</p>
                            <p class="text-white text-5xl font-black">${state.score.blue}</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl shadow-2xl p-10 mb-6 text-center">
                        <p class="text-gray-600 text-lg mb-4 font-bold">המילה להתאר:</p>
                        <p class="text-8xl font-black text-purple-600 mb-8 animate-bounce-word">${state.currentWord || '?'}</p>
                        ${!state.gameActive ? `<button onclick="startRound()" class="bg-green-500 text-white font-bold py-4 px-10 rounded-2xl text-2xl shadow-lg">🚀 התחל סיבוק</button>` : `<div class="text-3xl font-black text-pink-600 animate-pulse-fast">🎯 תאר!</div>`}
                    </div>
                    ${state.gameActive ? `
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <button onclick="guessCorrect()" class="bg-green-500 text-white font-bold py-6 rounded-2xl text-2xl shadow-xl">✅ נכון!</button>
                            <button onclick="skipWord()" class="bg-yellow-600 text-white font-bold py-6 rounded-2xl text-2xl shadow-xl">⏭ דלג</button>
                        </div>
                        <button onclick="togglePause()" class="w-full bg-yellow-500 text-white font-bold py-3 rounded-2xl mb-4 text-lg">${state.gamePaused ? '▶️ המשך' : '⏸ השהה'}</button>
                    ` : ''}
                    <button onclick="endGame()" class="w-full bg-red-600 text-white font-bold py-3 rounded-2xl shadow-lg text-lg">🛑 סיים משחק</button>
                </div>
            </div>`;
        }

        function renderResults() {
            const winner = state.score.red > state.score.blue ? 'אדומה' : state.score.blue > state.score.red ? 'כחולה' : 'תיקו';
            const winnerBg = winner === 'אדומה' ? 'from-red-600 to-pink-500' : winner === 'כחולה' ? 'from-blue-600 to-cyan-500' : 'from-gray-600 to-gray-500';
            return `<div class="min-h-screen bg-gradient-to-br ${winnerBg} flex items-center justify-center p-4">
                <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
                    <h2 class="text-7xl font-black mb-6">🏆</h2>
                    <h2 class="text-4xl font-bold mb-4 text-gray-800">קבוצה <span class="text-purple-600">${winner}</span></h2>
                    <p class="text-5xl font-black mb-8 text-gray-700">ניצחה!</p>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-red-100 rounded-2xl p-6">
                            <p class="text-red-600 font-bold text-lg mb-2">🔴</p>
                            <p class="text-5xl font-black text-red-600">${state.score.red}</p>
                        </div>
                        <div class="bg-blue-100 rounded-2xl p-6">
                            <p class="text-blue-600 font-bold text-lg mb-2">🔵</p>
                            <p class="text-5xl font-black text-blue-600">${state.score.blue}</p>
                        </div>
                    </div>
                    <button onclick="resetGame()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg text-lg mb-3">🏠 משחק חדש</button>
                    <button onclick="state.screen = 'home'; resetGame()" class="w-full bg-gray-400 text-white font-bold py-3 rounded-2xl">← חזור לבית</button>
                </div>
            </div>`;
        }

        render();
    </script>
</body>
